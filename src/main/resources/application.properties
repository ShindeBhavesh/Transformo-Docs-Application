# Server Configuration
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/docconvert_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Bhavesh@17
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# JWT Configuration
jwt.secret=your-256-bit-secret-key-for-jwt-token-generation-change-this-in-production
jwt.expiration=86400000

# AWS S3 Configuration (Optional - set your credentials)
aws.s3.bucket-name=docconvert-pro-bucket
aws.s3.region=us-east-1
aws.access-key=YOUR_AWS_ACCESS_KEY
aws.secret-key=YOUR_AWS_SECRET_KEY

# Local Storage (fallback when S3 is not configured)
app.upload.dir=./uploads
app.converted.dir=./converted

# Tesseract OCR Path (update based on your OS)
# Windows
tesseract.data.path=C:/Program Files/Tesseract-OCR/tessdata
# Linux
# tesseract.data.path=/usr/share/tesseract-ocr/4.00/tessdata
# macOS
# tesseract.data.path=/usr/local/share/tessdata

# Logging
logging.level.com.docconvert=DEBUG
logging.level.org.springframework.security=DEBUG


# Add these to your application.properties

# Swagger/OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# Tesseract OCR path (adjust based on your system)

# For Windows: tesseract.data.path=C:/Program Files/Tesseract-OCR/tessdata
# For Linux: tesseract.data.path=/usr/share/tesseract-ocr/4.00/tessdata
# For Mac: tesseract.data.path=/usr/local/share/tessdata